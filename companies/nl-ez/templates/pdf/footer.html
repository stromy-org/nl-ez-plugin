<!--
  PDF footer template — Playwright `footerTemplate`.
  Playwright only resolves classes: date, title, url, pageNumber, totalPages.
  Anything else (brand name, confidentiality) must be hard-coded here per client.

  Build script may substitute {{BRAND_NAME}} and {{CONFIDENTIALITY}} before
  passing this string to render_pdf.render_with_playwright(footer_template=...).
-->
<div style="
  font-size: 8pt;
  font-family: 'IBM Plex Mono', monospace;
  color: #999;
  width: 100%;
  padding: 0 18mm;
  display: flex;
  justify-content: space-between;">
  <span>{{BRAND_NAME}}</span>
  <span>{{CONFIDENTIALITY}}</span>
  <span><span class="pageNumber"></span> / <span class="totalPages"></span></span>
</div>
