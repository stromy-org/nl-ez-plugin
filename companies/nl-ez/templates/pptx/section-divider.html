<!DOCTYPE html>
<!--
  SECTION DIVIDER slide shell — used between major deck sections.
  Visible frame only; large section title + optional motif/photo background.
  See cover.html for the full token contract.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<title>section-divider</title>
<link rel="stylesheet" href="../../tokens.css">
<style>
  html, body { margin: 0; padding: 0; }
  body {
    width: 1920px; height: 1080px;
    background: var(--color-background-alt, var(--color-background, #1a1a1a));
    color: var(--color-text, #ffffff);
    font-family: var(--font-body, sans-serif);
    position: relative;
    overflow: hidden;
  }
  .divider-motif {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    opacity: 0.18;
    z-index: 0;
  }
  .divider-overlay {
    position: absolute; inset: 0;
    background: var(--color-primary, #000);
    opacity: 0.6;
    z-index: 1;
  }
  .divider-content {
    position: absolute; inset: 0;
    padding: 96px 120px;
    display: flex; flex-direction: column; justify-content: center;
    z-index: 2;
  }
  .divider-section-num {
    font-family: var(--font-mono, monospace);
    font-size: 22pt;
    text-transform: uppercase;
    letter-spacing: 4px;
    color: var(--color-accent, #fff);
    margin-bottom: 32px;
  }
  .divider-title {
    font-family: var(--font-heading, serif);
    font-size: 120pt;
    font-weight: 700;
    line-height: 1.0;
    color: var(--color-text, #ffffff);
    margin: 0;
    max-width: 1500px;
  }
  .divider-subtitle {
    font-size: 32pt;
    line-height: 1.3;
    color: var(--color-text, #ffffff);
    opacity: 0.8;
    margin: 40px 0 0 0;
    max-width: 1200px;
  }
</style>
</head>
<body>
  <div class="divider-motif" data-anchor="divider.motif"></div>
  <div class="divider-overlay" data-anchor="divider.overlay"></div>
  <div class="divider-content">
    <div class="divider-section-num" data-anchor="divider.sectionNumber"></div>
    <h1 class="divider-title" data-anchor="divider.title"></h1>
    <p class="divider-subtitle" data-anchor="divider.subtitle"></p>
  </div>
</body>
</html>
